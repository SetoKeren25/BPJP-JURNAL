<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jurnal Analisis Saham BPJP</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        :root {
            --primary-color: #2563eb;
            --success-color: #059669;
            --danger-color: #dc2626;
            --bg-color: #f8fafc;
            --card-bg: #ffffff;
            --border-color: #e2e8f0;
            --text-main: #1e293b;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            font-family: 'Inter', system-ui, -apple-system, sans-serif; 
            background-color: var(--bg-color); 
            color: var(--text-main);
            padding: 20px 10px; 
        }

        .container { 
            max-width: 950px; 
            margin: 0 auto; 
            background: var(--card-bg); 
            padding: 30px; 
            border-radius: 12px; 
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); 
            position: relative;
        }

        /* Watermark - Hanya muncul saat cetak/PDF */
        .watermark {
            display: none;
            position: absolute;
            top: 10px;
            right: 20px;
            font-size: 10px;
            color: #94a3b8;
            font-style: italic;
        }

        .header-controls { 
            text-align: center; 
            margin-bottom: 30px; 
            padding-bottom: 20px; 
            border-bottom: 2px solid var(--border-color); 
        }

        h2 { font-size: 1.8rem; font-weight: 800; color: var(--primary-color); letter-spacing: -0.5px; margin-bottom: 20px; }

        .btn-group { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; }
        
        button { 
            padding: 10px 20px; 
            border-radius: 8px; 
            cursor: pointer; 
            font-weight: 600; 
            transition: all 0.2s ease; 
            border: none;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
        }

        .btn-tambah { background-color: var(--primary-color); color: white; }
        .btn-tambah:hover { background-color: #1d4ed8; transform: translateY(-1px); }
        
        .btn-pdf { background-color: var(--success-color); color: white; }
        .btn-pdf:hover { background-color: #047857; }
        
        .btn-reset { background-color: #64748b; color: white; }
        
        .btn-hapus { 
            background-color: #fef2f2; 
            color: var(--danger-color); 
            border: 1px solid #fee2e2; 
            margin-top: 10px; 
            width: 100%; 
            justify-content: center;
        }
        .btn-hapus:hover { background-color: #fee2e2; }

        /* Modern Table Style */
        .tabel-container { 
            border: 1px solid var(--border-color); 
            border-radius: 10px;
            margin-bottom: 40px; 
            overflow: hidden; 
            background: white;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
        }

        .nama-saham-header { 
            background-color: #f1f5f9; 
            padding: 15px; 
            border-bottom: 1px solid var(--border-color); 
        }

        .nama-saham-input { 
            font-size: 18px; 
            font-weight: 700; 
            text-transform: uppercase; 
            border: none; 
            width: 100%; 
            outline: none; 
            background: transparent;
            color: var(--primary-color);
        }

        .table-responsive { overflow-x: auto; width: 100%; }
        table { width: 100%; border-collapse: collapse; min-width: 650px; }
        th, td { border: 1px solid var(--border-color); padding: 12px 15px; text-align: left; font-size: 14px; }
        
        .col-no { width: 40px; text-align: center; color: #64748b; font-weight: 600; background: #f8fafc; }
        .col-param { width: 230px; font-weight: 600; color: #334155; }
        
        .input-group { display: flex; align-items: center; gap: 10px; }
        .input-broker, .input-avg { 
            padding: 8px; 
            border: 1px solid var(--border-color); 
            border-radius: 6px; 
            font-size: 14px;
            outline: none;
        }
        .input-broker:focus, .input-avg:focus { border-color: var(--primary-color); ring: 2px solid #bfdbfe; }
        
        label { 
            display: inline-flex; 
            align-items: center; 
            margin-right: 15px; 
            cursor: pointer; 
            padding: 5px 10px;
            border-radius: 6px;
            transition: background 0.2s;
        }
        label:hover { background: #f1f5f9; }
        input[type="checkbox"] { width: 16px; height: 16px; accent-color: var(--primary-color); margin-right: 8px; }

        /* PDF Printing Setup */
        @media print { 
            .btn-hapus, .header-controls, .btn-group { display: none !important; } 
            .container { box-shadow: none; border: none; padding: 0; }
            .watermark { display: block !important; }
            body { background: white; padding: 0; }
        }
    </style>
</head>
<body>

    <div class="container" id="main-app">
        <div class="watermark">Kelompok 6 TTS Batch 5</div>

        <div class="header-controls">
            <h2>Jurnal Analisis Saham BPJP</h2>
            <div class="btn-group">
                <button class="btn-tambah" onclick="tambahTabel()">➕ Tambah Saham</button>
                <button class="btn-pdf" onclick="simpanPDF()">📥 Simpan Ke PDF</button>
                <button class="btn-reset" onclick="resetSemua()">🔄 Reset Data</button>
            </div>
        </div>

        <div id="pdf-content">
            <div id="workspace"></div>
        </div>
    </div>

    <template id="template-tabel">
        <div class="tabel-container">
            <div class="nama-saham-header">
                <input type="text" class="nama-saham-input" placeholder="KETIK NAMA SAHAM DISINI..." oninput="saveData()">
            </div>
            <div class="table-responsive">
                <table>
                    <tbody>
                        <tr><td class="col-no">1</td><td class="col-param">Saham Bergerak</td>
                            <td><label><input type="checkbox" onchange="saveData()"> Bergerak</label><label><input type="checkbox" onchange="saveData()"> Tidak Bergerak</label></td></tr>
                        <tr><td class="col-no">2</td><td class="col-param">Broker Action (Flow)</td>
                            <td><label><input type="checkbox" onchange="saveData()"> Kiri Ke Kanan</label><label><input type="checkbox" onchange="saveData()"> Kanan ke Kiri</label></td></tr>
                        <tr><td class="col-no">#</td><td class="col-param">Top Buy (Broker & AVG)</td>
                            <td><div class="input-group">
                                <input type="text" class="input-broker" placeholder="Broker" oninput="saveData()">
                                <span style="font-weight: 700; font-size: 12px; color: #64748b;">AVG</span>
                                <input type="number" class="input-avg" placeholder="Harga" oninput="saveData()">
                            </div></td></tr>
                        <tr><td class="col-no">#</td><td class="col-param">Akumulasi / Distribusi</td>
                            <td><label><input type="checkbox" onchange="saveData()"> Big Acc</label><label><input type="checkbox" onchange="saveData()"> Big Dist</label></td></tr>
                        <tr><td class="col-no">3</td><td class="col-param">Price & Volume</td>
                            <td>
                                <label><input type="checkbox" onchange="saveData()"> Harga ↑</label>
                                <label><input type="checkbox" onchange="saveData()"> Harga ↓</label>
                                <label><input type="checkbox" onchange="saveData()"> Vol ↑</label>
                                <label><input type="checkbox" onchange="saveData()"> Vol ↓</label>
                            </td></tr>
                        <tr><td class="col-no">4</td><td class="col-param">Stochastic</td>
                            <td><label><input type="checkbox" onchange="saveData()"> Golden Cross</label><label><input type="checkbox" onchange="saveData()"> Death Cross</label></td></tr>
                        <tr><td class="col-no">5</td><td class="col-param">MACD</td>
                            <td><label><input type="checkbox" onchange="saveData()"> Golden Cross</label><label><input type="checkbox" onchange="saveData()"> Death Cross</label></td></tr>
                        <tr><td class="col-no">6</td><td class="col-param">Moving Average (MA 20)</td>
                            <td><label><input type="checkbox" onchange="saveData()"> Diatas MA 20</label><label><input type="checkbox" onchange="saveData()"> Dibawah MA 20</label></td></tr>
                    </tbody>
                </table>
            </div>
            <button class="btn-hapus" onclick="hapusTabel(this)">🗑️ Hapus Baris Ini</button>
        </div>
    </template>

    <script>
        document.addEventListener("DOMContentLoaded", loadData);

        function tambahTabel(data = null) {
            const workspace = document.getElementById('workspace');
            const template = document.getElementById('template-tabel');
            const clone = template.content.cloneNode(true);
            const container = clone.querySelector('.tabel-container');

            if (data) {
                container.querySelector('.nama-saham-input').value = data.nama || "";
                container.querySelector('.input-broker').value = data.broker || "";
                container.querySelector('.input-avg').value = data.avg || "";
                const checks = container.querySelectorAll('input[type="checkbox"]');
                if (data.checks) {
                    data.checks.forEach((val, i) => { if (checks[i]) checks[i].checked = val; });
                }
            }

            workspace.appendChild(clone);
            saveData();
        }

        function hapusTabel(btn) {
            if(confirm("Hapus tabel ini?")) { btn.closest('.tabel-container').remove(); saveData(); }
        }

        function saveData() {
            const tables = [];
            document.querySelectorAll('.tabel-container').forEach(el => {
                const checks = Array.from(el.querySelectorAll('input[type="checkbox"]')).map(c => c.checked);
                tables.push({
                    nama: el.querySelector('.nama-saham-input').value,
                    broker: el.querySelector('.input-broker').value,
                    avg: el.querySelector('.input-avg').value,
                    checks: checks
                });
            });
            localStorage.setItem('bpjp_v2_data', JSON.stringify(tables));
        }

        function loadData() {
            const saved = localStorage.getItem('bpjp_v2_data');
            if (saved) {
                const tables = JSON.parse(saved);
                if (tables.length > 0) {
                    document.getElementById('workspace').innerHTML = "";
                    tables.forEach(t => tambahTabel(t));
                } else { tambahTabel(); }
            } else { tambahTabel(); }
        }

        function resetSemua() {
            if(confirm("Hapus semua data analisis?")) { localStorage.removeItem('bpjp_v2_data'); location.reload(); }
        }

        function simpanPDF() {
            const element = document.getElementById('main-app');
            const opt = {
                margin: [0.3, 0.3, 0.3, 0.3],
                filename: 'Analisis-Saham-BPJP.pdf',
                image: { type: 'jpeg', quality: 1 },
                html2canvas: { scale: 3, useCORS: true },
                jsPDF: { unit: 'in', format: 'a4', orientation: 'portrait' }
            };
            
            // Menampilkan watermark sebelum proses PDF
            document.querySelector('.watermark').style.display = 'block';
            
            html2pdf().set(opt).from(element).toPdf().get('pdf').then(function (pdf) {
                // Sembunyikan kembali setelah selesai (opsional, karena halaman akan tetap ada)
            }).save();
        }
    </script>
</body>
</html>
