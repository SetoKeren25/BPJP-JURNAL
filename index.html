<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jurnal Analisis Saham BPJP</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Arial', sans-serif; background-color: #f0f2f5; padding: 10px; }
        .container { max-width: 900px; margin: 0 auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        
        .header-controls { text-align: center; margin-bottom: 25px; padding-bottom: 15px; border-bottom: 1px solid #ddd; }
        h2 { margin: 0 0 15px 0; color: #333; font-size: 1.5rem; }
        
        .btn-group { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }
        button { padding: 12px 20px; border-radius: 6px; cursor: pointer; font-weight: 600; transition: 0.3s; border: none; }
        
        .btn-tambah { background-color: #007bff; color: white; }
        .btn-pdf { background-color: #28a745; color: white; }
        .btn-reset { background-color: #6c757d; color: white; }
        .btn-hapus { background-color: #fff; color: #dc3545; border: 1px solid #dc3545; margin-top: 15px; width: 100%; }

        /* Tabel Style */
        .tabel-container { border: 1px solid #000; margin-bottom: 30px; overflow: hidden; background: white; }
        .nama-saham-header { background-color: #f8f9fa; padding: 10px 15px; border-bottom: 1px solid #000; }
        .nama-saham-input { font-size: 16px; font-weight: bold; text-transform: uppercase; border: none; width: 100%; outline: none; background: transparent; }
        
        .table-responsive { overflow-x: auto; width: 100%; }
        table { width: 100%; border-collapse: collapse; min-width: 600px; }
        table, th, td { border: 1px solid #000; }
        th, td { padding: 8px; text-align: left; vertical-align: middle; font-size: 13px; }
        
        .col-no { width: 30px; text-align: center; font-weight: bold; }
        .col-param { width: 220px; }
        .input-group { display: flex; align-items: center; gap: 8px; }
        .input-broker, .input-avg { padding: 5px; border: 1px solid #ccc; border-radius: 3px; outline: none; }
        
        label { display: inline-flex; align-items: center; margin-right: 12px; cursor: pointer; }
        input[type="checkbox"] { margin-right: 6px; }

        /* Sembunyikan tombol hapus saat print PDF */
        @media print { .btn-hapus, .header-controls { display: none !important; } .container { box-shadow: none; } }
    </style>
</head>
<body>

    <div class="container">
        <div class="header-controls">
            <h2>Jurnal Analisis Saham BPJP</h2>
            <div class="btn-group">
                <button class="btn-tambah" onclick="tambahTabel()">+ Tambah Saham</button>
                <button class="btn-pdf" onclick="simpanPDF()">📥 Simpan Ke PDF</button>
                <button class="btn-reset" onclick="resetSemua()">🔄 Reset Semua</button>
            </div>
        </div>

        <div id="pdf-content">
            <div id="workspace"></div>
        </div>
    </div>

    <template id="template-tabel">
        <div class="tabel-container">
            <div class="nama-saham-header">
                <input type="text" class="nama-saham-input" placeholder="KETIK NAMA SAHAM DISINI" oninput="saveData()">
            </div>
            <div class="table-responsive">
                <table>
                    <tbody>
                        <tr><td class="col-no">1</td><td class="col-param">Saham Bergerak</td>
                            <td><label><input type="checkbox" onchange="saveData()"> Saham Bergerak</label><label><input type="checkbox" onchange="saveData()"> Saham Tidak Bergerak</label></td></tr>
                        <tr><td class="col-no">2</td><td class="col-param">Aliran Dana Broker Action</td>
                            <td><label><input type="checkbox" onchange="saveData()"> Dari Kiri Ke Kanan</label><label><input type="checkbox" onchange="saveData()"> Dari Kanan ke Kiri</label></td></tr>
                        <tr><td class="col-no">-</td><td class="col-param">Top Buy (Broker & AVG)</td>
                            <td><div class="input-group">
                                <input type="text" class="input-broker" placeholder="Broker" oninput="saveData()">
                                <b>AVG:</b><input type="number" class="input-avg" placeholder="Angka" oninput="saveData()">
                            </div></td></tr>
                        <tr><td class="col-no">-</td><td class="col-param">Akumulasi/Distribusi</td>
                            <td><label><input type="checkbox" onchange="saveData()"> Proses Big Acc</label><label><input type="checkbox" onchange="saveData()"> Proses Big Dist</label></td></tr>
                        <tr><td class="col-no">3</td><td class="col-param">Price & Volume</td>
                            <td><label><input type="checkbox" onchange="saveData()"> Harga Naik</label><label><input type="checkbox" onchange="saveData()"> Harga Turun</label><label><input type="checkbox" onchange="saveData()"> Volume Naik</label></td></tr>
                        <tr><td class="col-no">4</td><td class="col-param">Indikator Stochastic</td>
                            <td><label><input type="checkbox" onchange="saveData()"> Golden Cross</label><label><input type="checkbox" onchange="saveData()"> Death Cross</label></td></tr>
                        <tr><td class="col-no">-</td><td class="col-param">MACD</td>
                            <td><label><input type="checkbox" onchange="saveData()"> Golden Cross</label><label><input type="checkbox" onchange="saveData()"> Death Cross</label></td></tr>
                        <tr><td class="col-no">-</td><td class="col-param">MA 20</td>
                            <td><label><input type="checkbox" onchange="saveData()"> Diatas MA 20</label><label><input type="checkbox" onchange="saveData()"> Dibawa MA 20</label></td></tr>
                    </tbody>
                </table>
            </div>
            <button class="btn-hapus" onclick="hapusTabel(this)">Hapus Tabel</button>
        </div>
    </template>

    <script>
        document.addEventListener("DOMContentLoaded", loadData);

        function tambahTabel(data = null) {
            const workspace = document.getElementById('workspace');
            const template = document.getElementById('template-tabel');
            const clone = template.content.cloneNode(true);
            const container = clone.querySelector('.tabel-container');

            if (data) {
                container.querySelector('.nama-saham-input').value = data.nama;
                container.querySelector('.input-broker').value = data.broker;
                container.querySelector('.input-avg').value = data.avg;
                const checks = container.querySelectorAll('input[type="checkbox"]');
                data.checks.forEach((val, i) => checks[i].checked = val);
            }

            workspace.appendChild(clone);
            saveData();
        }

        function hapusTabel(btn) {
            if(confirm("Hapus analisis ini?")) { btn.closest('.tabel-container').remove(); saveData(); }
        }

        function saveData() {
            const tables = [];
            document.querySelectorAll('.tabel-container').forEach(el => {
                const checks = Array.from(el.querySelectorAll('input[type="checkbox"]')).map(c => c.checked);
                tables.push({
                    nama: el.querySelector('.nama-saham-input').value,
                    broker: el.querySelector('.input-broker').value,
                    avg: el.querySelector('.input-avg').value,
                    checks: checks
                });
            });
            localStorage.setItem('bpjp_data', JSON.stringify(tables));
        }

        function loadData() {
            const saved = localStorage.getItem('bpjp_data');
            if (saved) {
                const tables = JSON.parse(saved);
                if (tables.length > 0) {
                    tables.forEach(t => tambahTabel(t));
                } else { tambahTabel(); }
            } else { tambahTabel(); }
        }

        function resetSemua() {
            if(confirm("Hapus SEMUA data?")) { localStorage.removeItem('bpjp_data'); location.reload(); }
        }

        function simpanPDF() {
            const element = document.getElementById('pdf-content');
            const opt = {
                margin: 0.5,
                filename: 'Jurnal-BPJP.pdf',
                image: { type: 'jpeg', quality: 0.98 },
                html2canvas: { scale: 2 },
                jsPDF: { unit: 'in', format: 'letter', orientation: 'portrait' }
            };
            html2pdf().set(opt).from(element).save();
        }
    </script>
</body>
</html>
